name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

jobs:
  build-apk:
    name: Build SMAPIGameLoader APK
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64: ${{ secrets.SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64 }}
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      PROJECT_PATH: SMAPIGameLoader/SMAPIGameLoader.csproj
      DEPENDENCIES_ROOT: ${{ github.workspace }}/SMAPI-Android-1.6

    steps:
      - name: Checkout SMAPILoader
        uses: actions/checkout@v4
        with:
          path: SMAPILoader

      - name: Checkout SMAPI Android dependencies
        if: ${{ vars.SMAPI_ANDROID_REPOSITORY != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SMAPI_ANDROID_REPOSITORY }}
          token: ${{ secrets.SMAPI_ANDROID_REPOSITORY_TOKEN || github.token }}
          path: SMAPI-Android-1.6

      - name: Restore SMAPI Android dependencies from secret archive
        if: ${{ env.SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          tmp_dependencies="$(mktemp -d)"
          mkdir -p "$DEPENDENCIES_ROOT"
          echo "$SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64" | base64 --decode > /tmp/smapi-android-dependencies.zip
          unzip -q /tmp/smapi-android-dependencies.zip -d "$tmp_dependencies"

          if [[ -d "$tmp_dependencies/src/DependenciesDll" ]]; then
            cp -a "$tmp_dependencies/." "$DEPENDENCIES_ROOT/"
          elif [[ -d "$tmp_dependencies/SMAPI-Android-1.6/src/DependenciesDll" ]]; then
            cp -a "$tmp_dependencies/SMAPI-Android-1.6/." "$DEPENDENCIES_ROOT/"
          else
            echo "::error title=Invalid SMAPI Android dependency archive::Archive must contain src/DependenciesDll directly or under SMAPI-Android-1.6/."
            find "$tmp_dependencies" -maxdepth 3 -type d -print
            exit 1
          fi
        env:
          SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64: ${{ secrets.SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64 }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: SMAPILoader/global.json

      - name: Install .NET Android workload
        run: dotnet workload install android

      - name: Verify external game dependency assemblies
        working-directory: SMAPILoader
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for dll in \
            "$DEPENDENCIES_ROOT/src/DependenciesDll/MonoGame.Framework.dll" \
            "$DEPENDENCIES_ROOT/src/DependenciesDll/StardewValley.dll" \
            "$DEPENDENCIES_ROOT/src/DependenciesDll/StardewValley.GameData.dll"
          do
            if [[ ! -f "$dll" ]]; then
              echo "::error file=$dll,title=Missing game dependency::Missing required dependency: $dll"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            printf '%s\n' \
              'No SMAPI Android dependencies were restored.' \
              '' \
              'Configure one of these before running the workflow:' \
              '- repository variable SMAPI_ANDROID_REPOSITORY pointing to a repository that contains src/DependenciesDll' \
              '- repository secret SMAPI_ANDROID_DEPENDENCIES_ZIP_BASE64 containing a base64-encoded zip with src/DependenciesDll'
            exit 1
          fi

      - name: Restore NuGet packages
        working-directory: SMAPILoader
        run: dotnet restore "$PROJECT_PATH" /p:SMAPIAndroidDependenciesRoot="$DEPENDENCIES_ROOT"

      - name: Publish APK
        working-directory: SMAPILoader
        run: >-
          dotnet publish "$PROJECT_PATH"
          --configuration "$CONFIGURATION"
          --framework net9.0-android
          --no-restore
          /p:AndroidPackageFormat=apk
          /p:SMAPIAndroidDependenciesRoot="$DEPENDENCIES_ROOT"

      - name: Collect APK artifact
        working-directory: SMAPILoader
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          find SMAPIGameLoader/bin/$CONFIGURATION/net9.0-android/publish -type f -name '*.apk' -print -exec cp {} artifacts/ \;
          test -n "$(find artifacts -type f -name '*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMAPIGameLoader-${{ env.CONFIGURATION }}-apk
          path: SMAPILoader/artifacts/*.apk
          if-no-files-found: error
          retention-days: 14
